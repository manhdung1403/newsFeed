<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trang cá nhân | Instagram Style</title>
    <style>
        /* Reset & Base */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            color: #262626;
        }

        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Header Profile Section */
        header {
            display: flex;
            align-items: center;
            margin-bottom: 44px;
            gap: 30px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #eee;
            object-fit: cover;
            border: 1px solid #dbdbdb;
        }

        .profile-info {
            flex-grow: 1;
        }

        .username-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .username-row h1 {
            font-size: 28px;
            font-weight: 300;
            margin: 0;
        }

        /* Buttons */
        button {
            background: transparent;
            border: 1px solid #dbdbdb;
            color: #262626;
            padding: 5px 9px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        #logoutBtn {
            color: #ed4956;
            border-color: #ed4956;
        }

        /* Grid System */
        .tabs {
            border-top: 1px solid #dbdbdb;
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 0;
        }

        .tab-item {
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 15px 0;
            border-top: 1px solid #262626;
            /* Active tab */
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #posts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .post-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #efefef;
            cursor: pointer;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .post-item:hover img {
            opacity: 0.8;
            filter: brightness(0.8);
        }

        /* Mobile responsive */
        @media (max-width: 735px) {
            #posts {
                gap: 3px;
            }

            .profile-pic {
                width: 77px;
                height: 77px;
            }

            header {
                gap: 15px;
            }

            .username-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <img src="https://via.placeholder.com/150" class="profile-pic" alt="Profile" />

            <section class="profile-info">
                <div class="username-row">
                    <h1 id="displayUsername">...</h1>
                    <button id="editBtn" style="display:none">Chỉnh sửa trang cá nhân</button>
                    <button id="logoutBtn">Đăng xuất</button>
                </div>
                <div id="userStats">
                    <span id="postCount"><strong>0</strong> bài viết</span>
                </div>
            </section>
        </header>

        <div class="tabs">
            <div class="tab-item">
                <span>Posts</span>
            </div>
        </div>

        <main id="posts">
            <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #8e8e8e;">
                Đang tải bài viết...
            </div>
        </main>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str && str !== 0) return '';
            return String(str).replace(/[&<>\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
        }

        async function loadProfile() {
            const statusResp = await fetch('/api/auth/status', { credentials: 'include' });
            if (!statusResp.ok) { window.location.href = '/user/login.html'; return; }
            const status = await statusResp.json();
            if (!status.loggedIn) { window.location.href = '/user/login.html'; return; }

            const user = status.user;
            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('editBtn').style.display = 'inline-block';

            const postsResp = await fetch('/api/posts', { credentials: 'include' });
            const postsContainer = document.getElementById('posts');

            if (!postsResp.ok) { postsContainer.innerHTML = '<div>Lỗi tải dữ liệu.</div>'; return; }

            const allPosts = await postsResp.json();
            const myPosts = allPosts.filter(p => String(p.user_id) === String(user.id));

            document.getElementById('postCount').innerHTML = `<strong>${myPosts.length}</strong> bài viết`;

            if (myPosts.length === 0) {
                postsContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding: 50px;">Chưa có bài viết nào.</div>';
                return;
            }

            postsContainer.innerHTML = myPosts.map(p => {
                // Nếu không có ảnh, dùng placeholder hoặc màu nền
                const imgSrc = p.image_url ? escapeHtml(p.image_url) : 'https://via.placeholder.com/500?text=No+Image';
                return `
                    <div class="post-item">
                        <img src="${imgSrc}" alt="${escapeHtml(p.caption || '')}" title="${escapeHtml(p.caption || '')}" />
                    </div>
                `;
            }).join('');
        }

        document.getElementById('logoutBtn').addEventListener('click', async function () {
            try {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            } catch (e) { }
            window.location.href = '/user/login.html';
        });

        loadProfile().catch(console.error);
    </script>
</body>

</html>
