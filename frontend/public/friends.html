<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Friends - NewsFeed</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 20px
        }

        .container {
            max-width: 900px;
            margin: 0 auto
        }

        h1 {
            margin-bottom: 12px
        }

        .list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .user {
            background: var(--dark-panel);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .actions {
            margin-left: auto;
            display: flex;
            gap: 8px
        }

        .btn {
            background: var(--primary-blue);
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer
        }

        .btn.ghost {
            background: transparent;
            color: var(--text-gray);
            border: 1px solid var(--border-medium)
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Người dùng</h1>
        <div id="usersList" class="list">Đang tải...</div>
    </div>
    <script src="/js/friends.js"></script>
</body>

</html>
