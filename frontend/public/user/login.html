<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - NewsFeed</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body.auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-link {
            margin-top: 18px;
            padding: 20px;
            background: white;
            border: 1px solid var(--border-light);
            font-size: 14px;
            color: var(--text-dark);
            text-align: center;
        }

        .register-link p {
            margin: 0;
            color: var(--text-dark);
        }

        .register-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .logo {
            font-size: 51px;
        }
    </style>
</head>

<body class="auth-page">
    <div class="wrapper">
        <div class="login-container">
            <div class="logo">NewsFeed</div>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="Mật khẩu" required>
                </div>
                <div class="error-message" id="errorMessage"></div>
                <button type="submit" class="btn" id="submitBtn">Đăng nhập</button>
            </form>
        </div>
        <div class="register-link">
            <p>Chưa có tài khoản? <a href="/user/register.html">Đăng ký</a></p>
        </div>
    </div>

    <script>
        // Lấy base URL (http://localhost:3000 hoặc origin hiện tại)
        const baseUrl = window.location.origin === 'http://127.0.0.1:5500' || window.location.protocol === 'file:'
            ? 'http://localhost:3000'
            : window.location.origin;

        // Cập nhật link đăng ký
        document.querySelector('.register-link a').href = `${baseUrl}/user/register.html`;

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Ẩn thông báo lỗi cũ
            errorMessage.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang xử lý...';

            try {
                const response = await fetch(`${baseUrl}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = `${baseUrl}/post/post.html`;
                } else {
                    errorMessage.textContent = data.error || 'Đăng nhập thất bại';
                    errorMessage.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Đăng nhập';
                }
            } catch (error) {
                console.error('Lỗi:', error);
                errorMessage.textContent = 'Không thể kết nối với server';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Đăng nhập';
            }
        });
    </script>
</body>

</html>
