<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsFeed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            padding-bottom: 60px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            border-bottom: 1px solid #dbdbdb;
            padding: 12px 0;
            z-index: 100;
        }

        .header-content {
            max-width: 935px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #262626;
            letter-spacing: -1px;
        }

        .auth-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .icon-btn {
            padding: 0;
            width: 36px;
            height: 36px;
            min-width: 36px;
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .btn-login {
            background-color: #0095f6;
            color: white;
        }

        .btn-login:hover {
            background-color: #1877f2;
        }

        .btn-register {
            background-color: transparent;
            color: #0095f6;
            border: 1px solid #dbdbdb;
        }

        .btn-register:hover {
            background-color: #fafafa;
        }

        .btn-logout {
            background-color: transparent;
            color: #262626;
            border: 1px solid #dbdbdb;
        }

        .btn-logout:hover {
            background-color: #fafafa;
        }

        .btn-profile {
            background-color: transparent;
            color: #0095f6;
            border: 1px solid #dbdbdb;
        }

        .btn-profile:hover {
            background-color: #fafafa;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            color: #262626;
            font-weight: 600;
            font-size: 14px;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            margin-top: 60px;
            padding: 0 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .feed {
            flex: 1 1 auto;
            min-width: 0;
        }

        .sidebar {
            width: 340px;
            min-width: 320px;
            position: sticky;
            top: 80px;
            align-self: flex-start;
        }

        .sidebar-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 10px;
        }

        .sidebar-card h2 {
            margin: 0 0 6px;
            font-size: 15px;
            font-weight: 700;
            color: #262626;
        }

        .sidebar-search {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        #sidebarUsersList {
            max-height: 500px;
            overflow-y: auto;
        }

        .user-suggestion {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .user-suggestion:last-child {
            border-bottom: none;
        }

        .user-suggestion .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .user-suggestion .username {
            font-size: 13px;
            color: #262626;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-suggestion .followers {
            font-size: 11px;
            color: #8e8e8e;
            white-space: nowrap;
        }

        .user-suggestion .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .user-suggestion .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-suggestion .follow-btn {
            padding: 4px 10px;
            font-size: 11px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .post-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-bottom: 24px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #efefef;
        }

        .post-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
            margin-right: 12px;
            overflow: hidden;
            position: relative;
        }

        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .post-username {
            font-weight: 600;
            font-size: 14px;
            color: #262626;
            text-decoration: none;
        }

        .post-image {
            width: 100%;
            display: block;
        }

        .post-content {
            padding: 12px 16px;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #efefef;
        }

        .action-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: #262626;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            color: #0095f6;
        }

        .follow-btn {
            margin-left: auto;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #dbdbdb;
            background: white;
            cursor: pointer;
            font-size: 12px;
            color: #262626;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .follow-btn.following {
            border-color: transparent;
            background: #0095f6;
            color: white;
        }

        .follow-btn:hover {
            background: #f0f0f0;
        }

        .follow-btn.following:hover {
            background: #1877f2;
        }

        .likes-count {
            font-size: 13px;
            color: #262626;
            margin-top: 8px;
        }

        .comment-section {
            margin-top: 12px;
            display: none;
        }

        .comment-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 8px;
            max-height: 140px;
            overflow-y: auto;
        }

        .comment-list li {
            background: #f8f8f8;
            border-radius: 4px;
            padding: 6px 10px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #262626;
        }

        .comment-input-row {
            display: flex;
            gap: 6px;
        }

        .comment-input-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 13px;
        }

        .comment-input-row button {
            padding: 8px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            background-color: #0095f6;
            color: white;
            cursor: pointer;
        }

        .comment-input-row button:hover {
            background-color: #1877f2;
        }

        .post-caption {
            font-size: 14px;
            color: #262626;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .post-caption .username {
            font-weight: 600;
            margin-right: 4px;
        }

        .post-time {
            font-size: 12px;
            color: #8e8e8e;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .login-prompt {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-top: 40px;
        }

        .login-prompt h2 {
            color: #262626;
            margin-bottom: 16px;
            font-size: 22px;
            font-weight: 300;
        }

        .login-prompt p {
            color: #8e8e8e;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .chat-unread-badge {
            background: #ed4956;
            color: #fff;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e8e;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">NewsFeed</div>
            <div id="authButtons" class="auth-buttons">
                <!-- Nút đăng nhập và đăng ký sẽ được thêm vào đây khi chưa đăng nhập -->
            </div>
            <div id="userInfo" class="user-info" style="display: none;">
                <span class="username" id="usernameDisplay"></span>
                <a class="btn btn-profile" id="addPostLink" href="#" style="display: none;">Tạo bài đăng</a>
                <a class="btn btn-profile" id="profileLink" href="#" style="display: none;">Trang cá nhân</a>

                <!-- Thêm 2 link mới -->
                <a class="btn btn-profile" href="/friends.html">Bạn bè</a>
                <a class="btn btn-profile" href="/chat.html">Nhắn tin</a>

                <button class="btn btn-logout icon-btn" id="logoutBtn" title="Đăng xuất" aria-label="Đăng xuất">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H9c-1.1 0-2 .9-2 2v4h2V5h10v14H9v-4H7v4c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="feed" id="postContainer">
            <p style="text-align: center; padding: 40px; color: #8e8e8e;">Đang kiểm tra đăng nhập...</p>
        </div>
        <aside class="sidebar">
            <div class="sidebar-card">
                <h2>Gợi ý người dùng</h2>
                <input id="userSearchInput" class="sidebar-search" type="text" placeholder="Tìm kiếm người dùng..." />
                <div id="sidebarUsersList">
                    <p style="color: #8e8e8e; margin: 8px 0;">Đang tải...</p>
                </div>
            </div>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let isLoggedIn = false;
        let currentUser = null;
        let notificationSocket = null;

        // Lấy base URL
        const baseUrl = window.location.origin === 'http://127.0.0.1:5500' || window.location.protocol === 'file:'
            ? 'http://localhost:3000'
            : window.location.origin;

        // Kiểm tra trạng thái đăng nhập
        async function checkAuthStatus() {
            try {
                const response = await fetch(`${baseUrl}/api/auth/status`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.loggedIn) {
                    isLoggedIn = true;
                    currentUser = data.user;
                    updateUIForLoggedIn();
                    fetchPosts();
                    fetchSuggestedUsers();
                } else {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                }
            } catch (error) {
                console.error("Lỗi khi kiểm tra đăng nhập:", error);
                updateUIForLoggedOut();
            }
        }

        // Cập nhật UI khi đã đăng nhập
        function updateUIForLoggedIn() {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const usernameDisplay = document.getElementById('usernameDisplay');
            const profileLink = document.getElementById('profileLink');

            authButtons.style.display = 'none';
            userInfo.style.display = 'flex';
            usernameDisplay.textContent = currentUser.username;
            profileLink.href = `${baseUrl}/user/profile.html`;
            profileLink.style.display = 'inline-block';
            addPostLink.href = `${baseUrl}/post/addpost.html`;
            addPostLink.style.display = 'inline-block';
        }

        // Cập nhật UI khi chưa đăng nhập
        function updateUIForLoggedOut() {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const postContainer = document.getElementById('postContainer');
            const profileLink = document.getElementById('profileLink');

            authButtons.style.display = 'flex';
            authButtons.innerHTML = `
                <a href="${baseUrl}/user/login.html" class="btn btn-login">Đăng nhập</a>
                <a href="${baseUrl}/user/register.html" class="btn btn-register">Đăng ký</a>
            `;
            userInfo.style.display = 'none';
            if (profileLink) profileLink.style.display = 'none';
            if (addPostLink) addPostLink.style.display = 'none';

            // Hiển thị thông báo yêu cầu đăng nhập
            postContainer.innerHTML = `
                <div class="login-prompt">
                    <h2>Đăng nhập để xem bài đăng</h2>
                    <p>Đăng nhập để xem ảnh và video từ bạn bè.</p>
                    <div class="auth-buttons" style="justify-content: center;">
                        <a href="${baseUrl}/user/login.html" class="btn btn-login">Đăng nhập</a>
                        <a href="${baseUrl}/user/register.html" class="btn btn-register">Đăng ký</a>
                    </div>
                </div>
            `;
        }

        function initNotificationSocket() {
            if (notificationSocket) notificationSocket.disconnect();
            if (!currentUser || !currentUser.id) return;
            try {
                notificationSocket = io(baseUrl, { withCredentials: true });
                notificationSocket.emit('register', currentUser.id);
                notificationSocket.on('unread_badge_update', () => loadChatUnreadBadge());
            } catch (e) { notificationSocket = null; }
        }

        async function loadChatUnreadBadge() {
            try {
                const badge = document.getElementById('chatUnreadBadge');
                if (!badge) return;
                // Show temporarily while loading
                badge.style.display = 'inline-flex';
                badge.textContent = '...';

                const r = await fetch(`${baseUrl}/api/conversations/unread-total`, {
                    credentials: 'include'
                });
                if (!r.ok) {
                    badge.style.display = 'none';
                    return;
                }

                const data = await r.json();
                const count = Number(data.unreadCount) || 0;
                if (count > 0) {
                    badge.textContent = String(count);
                    badge.style.display = 'inline-flex';
                } else {
                    badge.style.display = 'none';
                }
            } catch {
                const badge = document.getElementById('chatUnreadBadge');
                if (badge) badge.style.display = 'none';
            }
        }

        // Lấy danh sách bài đăng
        async function fetchPosts() {
            if (!isLoggedIn) {
                return;
            }

            try {
                const response = await fetch(`${baseUrl}/api/posts`, {
                    credentials: 'include'
                });

                if (response.status === 401) {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                    return;
                }

                const posts = await response.json();

                const container = document.getElementById('postContainer');
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty-state">Chưa có bài đăng nào.</div>';
                    return;
                }

                posts.forEach(post => {
                    const postElement = document.createElement('div');
                    postElement.className = 'post-card';

                    const username = post.username || 'User #' + post.user_id;
                    const avatarInitial = username.charAt(0).toUpperCase();
                    const timeAgo = getTimeAgo(new Date(post.created_at));

                    const isFollowing = !!post.is_following;
                    const isOwnPost = String(post.user_id) === String(currentUser.id);

                    const likeCount = typeof post.like_count === 'number' ? post.like_count : 0;
                    const liked = !!post.liked_by_current_user;
                    const likedClass = liked ? 'liked' : '';
                    const likeLabel = liked ? '💖 Đã thả tim' : '🤍 Thả tim';

                    postElement.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">
                                ${post.user_avatar ? `<img src="${post.user_avatar}" alt="${username} avatar">` : avatarInitial}
                            </div>
                            <a class="post-username" href="/user/profile.html?userId=${post.user_id}">${username}</a>
                            ${!isOwnPost ? `<button class="follow-btn ${isFollowing ? 'following' : ''}" data-user-id="${post.user_id}">${isFollowing ? 'Đang theo dõi' : 'Theo dõi'}</button>` : ''}
                        </div>
                        ${post.image_url ? `<img src="${post.image_url}" alt="Post image" class="post-image">` : ''}
                        <div class="post-content">
                            ${post.caption ? `
                                <div class="post-caption">
                                    <span class="username">${username}</span>
                                    ${post.caption}
                                </div>
                            ` : ''}
                            <div class="post-actions">
                                <button class="action-btn like-btn ${likedClass}" data-post-id="${post.id}">${likeLabel}</button>
                                <button class="action-btn comment-toggle-btn" data-post-id="${post.id}">💬 Bình luận</button>
                            </div>
                            <div class="likes-count" id="likes-count-${post.id}">${likeCount} lượt thích</div>
                            <div class="comment-section" id="comment-section-${post.id}">
                                <ul class="comment-list" id="comment-list-${post.id}"></ul>
                                <div class="comment-input-row">
                                    <input type="text" placeholder="Viết bình luận..." id="comment-input-${post.id}">
                                    <button type="button" class="comment-submit-btn" data-post-id="${post.id}">Gửi</button>
                                </div>
                            </div>
                            <div class="post-time">${timeAgo}</div>
                        </div>
                    `;
                    container.appendChild(postElement);
                    renderComments(post.id, getCommentsState(post.id));
                });
            } catch (error) {
                console.error("Lỗi khi lấy dữ liệu:", error);
                document.getElementById('postContainer').innerHTML = '<div class="empty-state" style="color: #ed4956;">Không thể kết nối với server.</div>';
            }
        }

        async function fetchSuggestedUsers(search = '') {
            if (!isLoggedIn) return;

            try {
                const searchQuery = search ? `?search=${encodeURIComponent(search)}` : '';
                const response = await fetch(`${baseUrl}/api/users${searchQuery}`, {
                    credentials: 'include'
                });

                if (response.status === 401) {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                    return;
                }

                const users = await response.json();
                renderSuggestedUsers(users);
            } catch (error) {
                console.error('Lỗi khi tải danh sách người dùng:', error);
                const list = document.getElementById('sidebarUsersList');
                if (list) list.innerHTML = '<p class="empty-state">Không thể tải danh sách người dùng.</p>';
            }
        }

        function renderSuggestedUsers(users) {
            const list = document.getElementById('sidebarUsersList');
            if (!list) return;

            if (!Array.isArray(users) || users.length === 0) {
                list.innerHTML = '<p class="empty-state">Không tìm thấy người dùng.</p>';
                return;
            }

            list.innerHTML = users.map(user => {
                const username = user.username || `User #${user.id}`;
                const avatarInitial = username.charAt(0).toUpperCase();
                const isFollowing = !!user.is_following;
                const followersCount = typeof user.followers_count === 'number' ? user.followers_count : 0;

                return `
                    <div class="user-suggestion" data-user-id="${user.id}">
                        <div class="user-info">
                            <div class="avatar">${user.avatar ? `<img src="${user.avatar}" alt="${username} avatar">` : avatarInitial}</div>
                            <div>
                                <a href="/user/profile.html?userId=${user.id}" class="username">${username}</a>
                                <div class="followers">${followersCount} người theo dõi</div>
                            </div>
                        </div>
                        <button class="btn follow-btn ${isFollowing ? 'following' : ''}" data-user-id="${user.id}">${isFollowing ? 'Đang theo dõi' : 'Theo dõi'}</button>
                    </div>
                `;
            }).join('');
        }

        // Tính thời gian đã trôi qua
        function getTimeAgo(date) {
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days} ngày trước`;
            if (hours > 0) return `${hours} giờ trước`;
            if (minutes > 0) return `${minutes} phút trước`;
            return 'Vừa xong';
        }

        function generateCommentId() {
            return 'c_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function getCommentsState(postId) {
            const raw = localStorage.getItem('comments_' + postId);
            if (!raw) return [];
            try {
                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed)) return [];
                return parsed.map(c => ({
                    id: c.id || generateCommentId(),
                    text: c.text || '',
                    likes: typeof c.likes === 'number' ? c.likes : 0,
                    liked: !!c.liked
                }));
            } catch {
                return [];
            }
        }

        function setCommentsState(postId, comments) {
            localStorage.setItem('comments_' + postId, JSON.stringify(comments));
        }

        function renderComments(postId, comments) {
            const list = document.getElementById(`comment-list-${postId}`);
            if (!list) return;

            list.innerHTML = comments.map(comment => {
                const safeText = String(comment.text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');

                const likeLabel = comment.liked ? '💖' : '🤍';
                return `
                    <li data-comment-id="${comment.id}">
                        <span>${safeText}</span>
                        <button type="button" class="action-btn comment-like-btn" data-post-id="${postId}" data-comment-id="${comment.id}">
                            ${likeLabel} ${comment.likes}
                        </button>
                    </li>
                `;
            }).join('');
        }

        document.addEventListener('click', async (e) => {
            const likeBtn = e.target.closest('.like-btn');
            const commentToggleBtn = e.target.closest('.comment-toggle-btn');
            const commentSubmitBtn = e.target.closest('.comment-submit-btn');

            if (likeBtn) {
                const postId = likeBtn.getAttribute('data-post-id');

                try {
                    likeBtn.disabled = true;
                    likeBtn.style.cursor = 'wait';

                    const response = await fetch(`${baseUrl}/api/posts/${postId}/like`, {
                        method: 'POST',
                        credentials: 'include'
                    });

                    if (response.status === 401) {
                        isLoggedIn = false;
                        updateUIForLoggedOut();
                        return;
                    }

                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        console.error('Lỗi tim bài viết:', data);
                    } else {
                        const liked = !!data.liked;
                        const likeCount = typeof data.like_count === 'number' ? data.like_count : 0;

                        const likesCountElem = document.getElementById(`likes-count-${postId}`);
                        if (likesCountElem) likesCountElem.textContent = `${likeCount} lượt thích`;

                        likeBtn.textContent = liked ? '💖 Đã thả tim' : '🤍 Thả tim';
                    }
                } catch (err) {
                    console.error('Lỗi kết nối khi tim:', err);
                } finally {
                    likeBtn.disabled = false;
                    likeBtn.style.cursor = 'pointer';
                }

                return;
            }

            const followBtn = e.target.closest('.follow-btn');
            if (followBtn) {
                const userId = followBtn.getAttribute('data-user-id');
                const isFollowing = followBtn.classList.contains('following');
                const endpoint = isFollowing ? 'unfollow' : 'follow';

                try {
                    followBtn.disabled = true;
                    const response = await fetch(`${baseUrl}/api/${endpoint}`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId })
                    });

                    if (response.status === 401) {
                        isLoggedIn = false;
                        updateUIForLoggedOut();
                        return;
                    }

                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        console.error('Lỗi khi thay đổi trạng thái theo dõi:', data);
                    } else {
                        followBtn.classList.toggle('following', !isFollowing);
                        followBtn.textContent = !isFollowing ? 'Đang theo dõi' : 'Theo dõi';
                    }
                } catch (err) {
                    console.error('Lỗi khi thay đổi trạng thái theo dõi:', err);
                } finally {
                    followBtn.disabled = false;
                }

                return;
            }

            const commentLikeBtn = e.target.closest('.comment-like-btn');
            if (commentLikeBtn) {
                const postId = commentLikeBtn.getAttribute('data-post-id');
                const commentId = commentLikeBtn.getAttribute('data-comment-id');
                const comments = getCommentsState(postId);
                const comment = comments.find(c => c.id === commentId);
                if (!comment) return;

                comment.liked = !comment.liked;
                comment.likes = comment.liked ? comment.likes + 1 : Math.max(0, comment.likes - 1);
                setCommentsState(postId, comments);
                renderComments(postId, comments);
                return;
            }

            if (commentToggleBtn) {
                const postId = commentToggleBtn.getAttribute('data-post-id');
                const section = document.getElementById(`comment-section-${postId}`);
                if (section) {
                    section.style.display = section.style.display === 'block' ? 'none' : 'block';
                    if (section.style.display === 'block') {
                        renderComments(postId, getCommentsState(postId));
                    }
                }
                return;
            }

            if (commentSubmitBtn) {
                const postId = commentSubmitBtn.getAttribute('data-post-id');
                const input = document.getElementById(`comment-input-${postId}`);
                if (!input || !input.value.trim()) return;

                const commentText = input.value.trim();
                const comments = getCommentsState(postId);
                const newComment = {
                    id: generateCommentId(),
                    text: commentText,
                    likes: 0,
                    liked: false
                };
                comments.push(newComment);
                setCommentsState(postId, comments);

                renderComments(postId, comments);

                input.value = '';

                return;
            }
        });

        // Xử lý đăng xuất
        async function handleLogout() {
            try {
                const response = await fetch(`${baseUrl}/api/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    isLoggedIn = false;
                    currentUser = null;
                    updateUIForLoggedOut();
                }
            } catch (error) {
                console.error("Lỗi khi đăng xuất:", error);
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();

            const searchInput = document.getElementById('userSearchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.trim();
                    fetchSuggestedUsers(query);
                });
            }

            // Cập nhật badge khi chuyển tab về trang post (vd: từ chat quay lại)
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && isLoggedIn) loadChatUnreadBadge();
            });

            document.addEventListener('click', (e) => {
                if (e.target.id === 'logoutBtn') {
                    handleLogout();
                }
            });
        });
    </script>
</body>

</html>
