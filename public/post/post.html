<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsFeed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            padding-bottom: 60px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            border-bottom: 1px solid #dbdbdb;
            padding: 12px 0;
            z-index: 100;
        }

        .header-content {
            max-width: 935px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #262626;
            letter-spacing: -1px;
        }

        .auth-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
        }

        .btn-login {
            background-color: #0095f6;
            color: white;
        }

        .btn-login:hover {
            background-color: #1877f2;
        }

        .btn-register {
            background-color: transparent;
            color: #0095f6;
            border: 1px solid #dbdbdb;
        }

        .btn-register:hover {
            background-color: #fafafa;
        }

        .btn-logout {
            background-color: transparent;
            color: #262626;
            border: 1px solid #dbdbdb;
        }

        .btn-logout:hover {
            background-color: #fafafa;
        }

        .btn-profile {
            background-color: transparent;
            color: #0095f6;
            border: 1px solid #dbdbdb;
        }

        .btn-profile:hover {
            background-color: #fafafa;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            color: #262626;
            font-weight: 600;
            font-size: 14px;
        }

        .feed {
            max-width: 614px;
            margin: 0 auto;
            margin-top: 60px;
            padding: 0 20px;
        }

        .post-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-bottom: 24px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #efefef;
        }

        .post-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
            margin-right: 12px;
        }

        .post-username {
            font-weight: 600;
            font-size: 14px;
            color: #262626;
        }

        .post-image {
            width: 100%;
            display: block;
        }

        .post-content {
            padding: 12px 16px;
        }

        .post-caption {
            font-size: 14px;
            color: #262626;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .post-caption .username {
            font-weight: 600;
            margin-right: 4px;
        }

        .post-time {
            font-size: 12px;
            color: #8e8e8e;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .login-prompt {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-top: 40px;
        }

        .login-prompt h2 {
            color: #262626;
            margin-bottom: 16px;
            font-size: 22px;
            font-weight: 300;
        }

        .login-prompt p {
            color: #8e8e8e;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e8e;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">NewsFeed</div>
            <div id="authButtons" class="auth-buttons">
                <!-- Nút đăng nhập và đăng ký sẽ được thêm vào đây khi chưa đăng nhập -->
            </div>
            <div id="userInfo" class="user-info" style="display: none;">
                <span class="username" id="usernameDisplay"></span>
                <a class="btn btn-profile" id="addPostLink" href="#" style="display: none;">Tạo bài đăng</a>
                <a class="btn btn-profile" id="profileLink" href="#" style="display: none;">Trang cá nhân</a>
                <button class="btn btn-logout" id="logoutBtn">Đăng xuất</button>
            </div>
        </div>
    </div>

    <div class="feed" id="postContainer">
        <p style="text-align: center; padding: 40px; color: #8e8e8e;">Đang kiểm tra đăng nhập...</p>
    </div>

    <script>
        let isLoggedIn = false;
        let currentUser = null;

        // Lấy base URL
        const baseUrl = window.location.origin === 'http://127.0.0.1:5500' || window.location.protocol === 'file:'
            ? 'http://localhost:3000'
            : window.location.origin;

        // Kiểm tra trạng thái đăng nhập
        async function checkAuthStatus() {
            try {
                const response = await fetch(`${baseUrl}/api/auth/status`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.loggedIn) {
                    isLoggedIn = true;
                    currentUser = data.user;
                    updateUIForLoggedIn();
                    fetchPosts();
                } else {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                }
            } catch (error) {
                console.error("Lỗi khi kiểm tra đăng nhập:", error);
                updateUIForLoggedOut();
            }
        }

        // Cập nhật UI khi đã đăng nhập
        function updateUIForLoggedIn() {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const usernameDisplay = document.getElementById('usernameDisplay');
            const profileLink = document.getElementById('profileLink');
            const addPostLink = document.getElementById('addPostLink');

            authButtons.style.display = 'none';
            userInfo.style.display = 'flex';
            usernameDisplay.textContent = currentUser.username;
            profileLink.href = `${baseUrl}/user/profile.html`;
            profileLink.style.display = 'inline-block';
            addPostLink.href = `${baseUrl}/post/addpost.html`;
            addPostLink.style.display = 'inline-block';
        }

        // Cập nhật UI khi chưa đăng nhập
        function updateUIForLoggedOut() {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const postContainer = document.getElementById('postContainer');
            const profileLink = document.getElementById('profileLink');
            const addPostLink = document.getElementById('addPostLink');

            authButtons.style.display = 'flex';
            authButtons.innerHTML = `
                <a href="${baseUrl}/user/login.html" class="btn btn-login">Đăng nhập</a>
                <a href="${baseUrl}/user/register.html" class="btn btn-register">Đăng ký</a>
            `;
            userInfo.style.display = 'none';
            if (profileLink) profileLink.style.display = 'none';
            if (addPostLink) addPostLink.style.display = 'none';

            // Hiển thị thông báo yêu cầu đăng nhập
            postContainer.innerHTML = `
                <div class="login-prompt">
                    <h2>Đăng nhập để xem bài đăng</h2>
                    <p>Đăng nhập để xem ảnh và video từ bạn bè.</p>
                    <div class="auth-buttons" style="justify-content: center;">
                        <a href="${baseUrl}/user/login.html" class="btn btn-login">Đăng nhập</a>
                        <a href="${baseUrl}/user/register.html" class="btn btn-register">Đăng ký</a>
                    </div>
                </div>
            `;
        }

        // Lấy danh sách bài đăng
        async function fetchPosts() {
            if (!isLoggedIn) {
                return;
            }

            try {
                const response = await fetch(`${baseUrl}/api/posts`, {
                    credentials: 'include'
                });

                if (response.status === 401) {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                    return;
                }

                const posts = await response.json();

                const container = document.getElementById('postContainer');
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty-state">Chưa có bài đăng nào.</div>';
                    return;
                }

                posts.forEach(post => {
                    const postElement = document.createElement('div');
                    postElement.className = 'post-card';

                    const username = post.username || 'User #' + post.user_id;
                    const avatarInitial = username.charAt(0).toUpperCase();
                    const timeAgo = getTimeAgo(new Date(post.created_at));

                    postElement.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">${avatarInitial}</div>
                            <div class="post-username">${username}</div>
                        </div>
                        ${post.image_url ? `<img src="${post.image_url}" alt="Post image" class="post-image">` : ''}
                        <div class="post-content">
                            ${post.caption ? `
                                <div class="post-caption">
                                    <span class="username">${username}</span>
                                    ${post.caption}
                                </div>
                            ` : ''}
                            <div class="post-time">${timeAgo}</div>
                        </div>
                    `;
                    container.appendChild(postElement);
                });
            } catch (error) {
                console.error("Lỗi khi lấy dữ liệu:", error);
                document.getElementById('postContainer').innerHTML = '<div class="empty-state" style="color: #ed4956;">Không thể kết nối với server.</div>';
            }
        }

        // Tính thời gian đã trôi qua
        function getTimeAgo(date) {
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days} ngày trước`;
            if (hours > 0) return `${hours} giờ trước`;
            if (minutes > 0) return `${minutes} phút trước`;
            return 'Vừa xong';
        }

        // Xử lý đăng xuất
        async function handleLogout() {
            try {
                const response = await fetch(`${baseUrl}/api/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    isLoggedIn = false;
                    currentUser = null;
                    updateUIForLoggedOut();
                }
            } catch (error) {
                console.error("Lỗi khi đăng xuất:", error);
            }
        }

        // Gắn sự kiện cho nút đăng xuất
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();

            document.addEventListener('click', (e) => {
                if (e.target.id === 'logoutBtn') {
                    handleLogout();
                }
            });
        });
    </script>
</body>

</html>
