<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm bài đăng - NewsFeed</title>
    <link rel="stylesheet" href="css/addpost.css">
</head>

<body>
    <div class="header">
        <div class="header-content">
            <div class="logo" onclick="goToFeed()">NewsFeed</div>
            <div id="userInfo" class="user-info" style="display: none;">
                <span class="username" id="usernameDisplay"></span>
                <button class="btn btn-logout" id="logoutBtn">Đăng xuất</button>
            </div>
        </div>
    </div>

    <div id="mainForm" style="display: none;">
        <div class="form-container">
            <div class="form-title">Tạo bài đăng mới</div>
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="addPostForm">
                <div class="form-group">
                    <label for="imageFile">Chọn ảnh từ máy tính:</label>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="imageUrl">URL ảnh:</label>
                    <input type="url" id="imageUrl" name="imageUrl" placeholder="https://example.com/image.jpg">
                </div>

                <img id="imagePreview" class="preview-image" alt="Preview">

                <div class="form-group">
                    <label for="caption">Mô tả:</label>
                    <textarea id="caption" name="caption" placeholder="Viết gì đó về bài đăng của bạn..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Đăng bài</button>
                <button type="button" class="btn-back" onclick="goToFeed()">Quay lại</button>
            </form>
        </div>
    </div>

    <div id="loginPrompt" style="display: none;">
        <div class="login-prompt">
            <h2>Đăng nhập để đăng bài</h2>
            <p>Bạn cần đăng nhập để có thể đăng bài lên NewsFeed.</p>
            <div class="auth-buttons" style="justify-content: center;">
                <a href="./login.html" class="btn btn-profile">Đăng nhập</a>
            </div>
        </div>
    </div>

    <script src="js/addpost.js"></script>
</body>

</html>
