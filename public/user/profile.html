<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trang cá nhân | Instagram Style</title>
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="https://via.placeholder.com/150" class="profile-pic" alt="Profile" />

            <section class="profile-info">
                <div class="username-row">
                    <h1 id="displayUsername">...</h1>
                    <button id="editBtn" style="display:none">Chỉnh sửa trang cá nhân</button>
                    <button id="logoutBtn">Đăng xuất</button>
                </div>
                <div id="userStats">
                    <span id="postCount"><strong>0</strong> bài viết</span>
                </div>
            </section>
        </header>

        <div class="tabs">
            <div class="tab-item">
                <span>Posts</span>
            </div>
        </div>

        <main id="posts">
            <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #8e8e8e;">
                Đang tải bài viết...
            </div>
        </main>
    </div>

    <script src="js/profile.js" defer></script>
</body>

</html>
