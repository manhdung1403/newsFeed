<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Friends - NewsFeed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: system-ui, Arial;
            background: #0b1220;
            color: #e5e7eb;
            margin: 0;
            padding: 20px
        }

        .container {
            max-width: 900px;
            margin: 0 auto
        }

        h1 {
            margin-bottom: 12px
        }

        .list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .user {
            background: #0f1720;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f97316, #ef4444);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700
        }

        .actions {
            margin-left: auto;
            display: flex;
            gap: 8px
        }

        .btn {
            background: #06b6d4;
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            color: #062024;
            cursor: pointer
        }

        .btn.ghost {
            background: transparent;
            color: #9ca3af;
            border: 1px solid #1f2937
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Người dùng</h1>
        <div id="usersList" class="list">Đang tải...</div>
    </div>
    <script src="/js/friends.js"></script>
</body>

</html>
